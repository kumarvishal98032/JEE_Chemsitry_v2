<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>JEE Chemistry Mock Test</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

```
<!-- Watermark Logo -->
<div id="watermark">
    <img src="logo.png" alt="Logo">
</div>

<!-- Top Bar -->
<div class="top">
    <h2>JEE Chemistry Mock Test</h2>
    <div id="timer">40:00</div>
</div>

<!-- Main Container -->
<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">

        <p style="color:red;font-weight:bold;">
            ⚠ Do not refresh the page during the test.
        </p>

        <label><b>Student Name:</b></label><br>

        <input
            type="text"
            id="studentName"
            placeholder="Enter your name">

        <br><br>

        <h3 id="qno"></h3>

        <p id="question"></p>

        <div id="options"></div>

        <br>

        <button onclick="prevQ()">
            Previous
        </button>

        <button onclick="clearResponse()">
            Clear Response
        </button>

        <button onclick="nextQ()">
            Save & Next
        </button>

        <button onclick="submitTest()">
            Submit Test
        </button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

        <h3>Question Palette</h3>

        <div id="palette"></div>

        <hr>

        <p>🟩 Answered</p>

        <p>⬜ Not Answered</p>

    </div>

</div>

<script src="script.js"></script>
```

</body>
</html>
